<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="category">
  <div class="site-shell">
    <header class="site-header compact-header">
      <div>
        <a class="back-link" href="index.html">← Back to library</a>
        <p class="eyebrow" id="categoryLabel">Category</p>
        <h1 id="categoryTitle">Quizzes</h1>
        <p class="subtle" id="categoryDescription"></p>
      </div>
        <div class="button-row wrap-row">
          <a class="ghost-button header-link" href="add-quizzes.html">Add Quizzes</a>

          <a id="accountLink" class="ghost-button header-link" href="my-account.html" style="display:none;">My Account</a>
          <button id="loginBtn" class="primary-link header-link" type="button">Sign in</button>
          <button id="logoutBtn" class="ghost-button header-link" type="button" style="display:none;">Sign Out</button>
        </div>
    </header>

    <main class="main-grid">
      <section class="panel">
        <div class="quiz-list" id="quizList"></div>
      </section>
    </main>
  </div>

  <script src="quizzes.js"></script>
  <script src="app.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
